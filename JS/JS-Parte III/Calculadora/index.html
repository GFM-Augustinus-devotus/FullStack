<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="./script.js" defer></script>
    <title>Calculadora</title>
</head>
<body>
    <main data-theme = "dark">
        <header id="input-value">
            <h1>Calculadora</h1>
            <button id="switch-theme">Switch Theme Dark/Light</button>
        </header>
        <input type="text" id="input">
        <div id="value-operation">
            <button class="button-value" value=" C ">C</button>
            <button class="button-value" value=" ( ">(</button>
            <button class="button-value" value=" ) ">)</button>
            <button class="button-value" value=" / ">/</button>
            <button class="button-value" value="7">7</button>
            <button class="button-value" value="8">8</button>
            <button class="button-value" value="9">9</button>
            <button class="button-value" value=" * ">*</button>
            <button class="button-value" value="4">4</button>
            <button class="button-value" value="5">5</button>
            <button class="button-value" value="6">6</button>
            <button class="button-value" value=" - ">-</button>
            <button class="button-value" value="1">1</button>
            <button class="button-value" value="2">2</button>
            <button class="button-value" value="3">3</button>
            <button class="button-value" value=" + ">+</button>
            <button class="button-value" value="0">0</button>
            <button class="button-value" value=".">.</button>
            <button class="button-value" value=" % ">mod</button>
            <button id="equal">=</button>
        </div>
        <section id="output-value">
            <button id="copy">Copy</button>
            <input type="text" id="output" disabled>
        </section>
    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Devs</title>
    <link rel="stylesheet" href="cadastroDev2.css">
    <script src="cadastroDev2.js" defer></script>
</head>
<body>
    <h1>Cadastro de Devs</h1>
    <form id="cadastro">
        <label for="nome">Nome Completo</label><br>
        <input type="text" name="nome" id="nome"><br><br>
        <button id="adicionar-tecnologia" type="button">Adicionar Tecnologia</button>
        <button id="remover-tecnologia" type="button">Remover Tecnologia</button>
        <ul id="listaTecnologias" name="listaTecnologias"></ul><br>
        <button id="enviarFormulario" type="submit">Enviar</button>
    </form>
</body>
</html>
